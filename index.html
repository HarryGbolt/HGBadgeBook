        * {

            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;

            -webkit-font-smoothing: antialiased;
        }

        .header {
            background: linear-gradient(135deg, #2d1b69 0%, #4a2c8a 100%);
            color: white;
            padding: 16px 20px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-top {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .header-top h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-align: center;
            width: 100%;
        }

        .search-wrap {
            padding: 12px 16px;
            background: white;
            border-bottom: 1px solid #eee;
        }
        .search-wrap input {
            width: 100%;
            padding: 10px 16px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            background: #f0f2f5;
            outline: none;
        }
        .search-wrap input:focus {
            background: #e8eaf0;
        }
        .search-wrap input::placeholder {
            color: #aaa;
        }

        .section-header {
            padding: 16px 16px 8px;
            font-size: 18px;
            font-weight: 700;
            color: #1a1a2e;
            background: #f2f4f8;
            position: sticky;
            top: 72px;
            z-index: 10;
        }
        .section-header .count {
            font-size: 13px;
            font-weight: 500;
            color: #888;
            margin-left: 8px;
        }

        .badge-list {
            padding: 0 16px;
        }

        .list-item {
            display: flex;
            align-items: center;
            gap: 14px;
            background: white;
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 8px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid rgba(0, 0, 0, 0.02);
        }
        .list-item:active {
            transform: scale(0.98);
            background: #f8f8fc;
        }
        .list-item .icon {
            font-size: 36px;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f3ff;
            border-radius: 10px;
            flex-shrink: 0;
        }
        .list-item .info {
            flex: 1;
            min-width: 0;
        }
        .list-item .info .name {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a2e;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
            line-clamp: 2;
        }
        .list-item .info .meta {
            font-size: 12px;
            color: #888;
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .list-item .info .meta .type {
            background: #f0f0f5;
            padding: 1px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: #888;
        }
        .list-item .info .meta .progress-text {
            color: #4a2c8a;
            font-weight: 500;
        }
        .list-item .check {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #e8e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: white;
            transition: all 0.3s;
            flex-shrink: 0;
            opacity: 0;
        }
        .list-item .check.done {
            opacity: 1;
            background: #2e7d32;
        }
        .list-item .progress-bar-mini {
            width: 60px;
            height: 4px;
            background: #f0f0f5;
            border-radius: 2px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .list-item .progress-bar-mini .fill {
            height: 100%;
            background: linear-gradient(90deg, #4a2c8a, #7c5cbf);
            border-radius: 2px;
            transition: width 0.3s;
            width: 0%;
        }

        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty .big {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 200;
            display: none;
            align-items: flex-end;
            justify-content: center;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal {
            background: white;
            width: 100%;
            max-width: 500px;
            max-height: 92vh;
            border-radius: 20px 20px 0 0;
            padding: 20px 20px 30px;
            overflow-y: auto;
            animation: slideUp 0.35s cubic-bezier(0.32, 0.72, 0, 1);
        }
        @keyframes slideUp {
            from {
                transform: translateY(60px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .modal-handle {
            width: 40px;
            height: 4px;
            background: #ddd;
            border-radius: 2px;
            margin: 0 auto 16px;
        }

        .modal .head {
            display: flex;
            gap: 14px;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid #f0f0f5;
        }
        .modal .head .icon {
            font-size: 44px;
            width: 56px;
            height: 56px;
            background: #f5f3ff;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .modal .head .info {

        }
        .modal .head .info h2 {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a2e;
            line-height: 1.2;
        }
        .modal .head .info .cat {

            color: #888;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }
        .modal .head .info .progress-text {
            font-size: 14px;
            color: #4a2c8a;
            font-weight: 600;
            margin-top: 4px;
        }
        .modal .close-btn {

            background: #f5f5f5;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            color: #666;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal .close-btn:active {
            background: #e8e8e8;
        }

        .modal .requirements-title {
            font-size: 16px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 12px;
        }
        .modal ul {
            list-style: none;
            padding: 0;
        }
        .modal ul li {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #f5f5f8;
            font-size: 15px;
            line-height: 1.4;
            color: #1a1a2e;
        }
        .modal ul li:last-child {
            border-bottom: none;
        }
        .modal ul li .num {
            font-size: 13px;
            font-weight: 600;
            color: #aaa;
            width: 26px;
            flex-shrink: 0;
            text-align: right;
        }
        .modal ul li input[type="checkbox"] {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
            margin-top: 1px;
            accent-color: #4a2c8a;
            cursor: pointer;
            border-radius: 6px;
        }
        .modal ul li .text.done {
            text-decoration: line-through;
            color: #bbb;
        }

        .stage-selector {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 12px 0 16px;
            padding: 12px 16px;
            background: #f5f3ff;
            border-radius: 12px;
            flex-wrap: wrap;
        }
        .stage-selector label {
            font-size: 14px;
            font-weight: 600;
            color: #4a2c8a;
        }
        .stage-selector select {
            flex: 1;
            min-width: 80px;
            padding: 8px 12px;
            border: 2px solid #4a2c8a;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            background: white;
            color: #1a1a2e;
            outline: none;
            cursor: pointer;
        }
        .stage-selector select:focus {
            border-color: #2d1b69;
            box-shadow: 0 0 0 3px rgba(74, 44, 138, 0.2);
        }
        .stage-selector .stage-progress {
            font-size: 13px;
            color: #4a2c8a;
            font-weight: 600;
            margin-left: auto;
        }

        .modal .footer {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #f0f0f5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal .footer .count {
            font-size: 14px;
            color: #4a2c8a;
            font-weight: 600;
        }
        .modal .footer .reset-btn {
            background: none;
            border: none;
            font-size: 14px;
            font-weight: 600;
            color: #e74c3c;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 8px;
        }
        .modal .footer .reset-btn:active {
            background: #fef0ef;
        }

        @media (min-width: 600px) {
            .modal {
                border-radius: 20px;
                margin: 20px;
                max-height: 80vh;
            }
            .modal-overlay {
                align-items: center;
            }
            .list-item {
                padding: 14px 18px;
            }
            .list-item .icon {
                font-size: 40px;
                width: 56px;
                height: 56px;
            }
        }
        .modal::-webkit-scrollbar {
            width: 4px;
        }
        .modal::-webkit-scrollbar-track {
            background: transparent;
        }
        .modal::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 4px;
        }
    </style>
</head>

        // ============================================================
        // ORDER — Sections in display order
        // ============================================================

        var SECTION_ORDER = [
            { key: "activity", label: "Activity Badges" },
            { key: "staged", label: "Staged Badges" },
            { key: "challenge", label: "Challenge Awards" },
            { key: "top", label: "Top Awards" }
        ];

        // ============================================================
        // STATE
        // ============================================================

        var state = {
            done: {},
            search: "",
            current: null,
            currentStage: "1"
        };

        function load() {
            try {
                var saved = localStorage.getItem("explorerTracker");
                if (saved) {
                    var parsed = JSON.parse(saved);
                    state.done = parsed.done || {};
                    state.currentStage = parsed.currentStage || "1";
                }
            } catch (e) {}
        }

        function save() {
            try {
                localStorage.setItem("explorerTracker", JSON.stringify({
                    done: state.done,
                    currentStage: state.currentStage
                }));
            } catch (e) {}
        }

        // ============================================================
        // HELPERS
        // ============================================================

        function getProgress(id) {
            var badge = BADGES[id];
            if (!badge) return { done: 0, total: 0, pct: 0 };

            if (badge.isStaged && badge.stages) {
                var totalDone = 0;
                var totalReqs = 0;
                var stageKeys = Object.keys(badge.stages);
                for (var s = 0; s < stageKeys.length; s++) {
                    var stageKey = stageKeys[s];
                    var reqs = badge.stages[stageKey];
                    for (var r = 0; r < reqs.length; r++) {
                        totalReqs++;
                        if (state.done[id + "-" + stageKey + "-" + r]) totalDone++;
                    }
                }
                var pct = totalReqs > 0 ? Math.round((totalDone / totalReqs) * 100) : 0;
                return { done: totalDone, total: totalReqs, pct: pct };
            }

            var total = badge.reqs.length;
            var done = 0;
            for (var i = 0; i < total; i++) {
                if (state.done[id + "-" + i]) done++;
            }
            return { done: done, total: total, pct: total > 0 ? Math.round((done / total) * 100) : 0 };
        }

        function getStageProgress(id, stageKey) {
            var badge = BADGES[id];
            if (!badge || !badge.isStaged || !badge.stages) return { done: 0, total: 0, pct: 0 };
            var reqs = badge.stages[stageKey];
            if (!reqs) return { done: 0, total: 0, pct: 0 };
            var done = 0;
            for (var i = 0; i < reqs.length; i++) {
                if (state.done[id + "-" + stageKey + "-" + i]) done++;
            }
            return { done: done, total: reqs.length, pct: reqs.length > 0 ? Math.round((done / reqs.length) * 100) : 0 };
        }

        function getFiltered() {
            var ids = Object.keys(BADGES);
            if (state.search.trim()) {
                var q = state.search.toLowerCase().trim();
                ids = ids.filter(function(id) {
                    return BADGES[id].name.toLowerCase().includes(q);
                });
            }
            return ids;
        }

        function getBadgesByCategory(catKey) {
            var ids = getFiltered();
            return ids.filter(function(id) {
                return BADGES[id].cat === catKey;
            });
        }

        // ============================================================
        // RENDER
        // ============================================================

        function renderAll() {
            renderList();
        }

        function renderList() {
            var container = document.getElementById("badgeContainer");
            var allIds = getFiltered();

            if (allIds.length === 0) {
                container.innerHTML =
                    '<div class="empty"><span class="big">🔍</span><p>No badges found matching your search.</p></div>';
                return;
            }

            var html = "";
            var catLabels = {
                activity: "Activity",
                staged: "Staged",
                challenge: "Challenge",
                top: "Top Award"
            };

            for (var s = 0; s < SECTION_ORDER.length; s++) {
                var section = SECTION_ORDER[s];
                var badgeIds = getBadgesByCategory(section.key);

                if (badgeIds.length === 0) continue;

                html += '<div class="section-header">' + section.label + ' <span class="count">' + badgeIds.length +
                    '</span></div>';
                html += '<div class="badge-list">';

                for (var i = 0; i < badgeIds.length; i++) {
                    var id = badgeIds[i];
                    var b = BADGES[id];
                    var p = getProgress(id);
                    var done = p.pct === 100 && p.total > 0;

                    html += '<div class="list-item" onclick="openModal(\'' + id + '\')">';
                    html += '<div class="icon">' + b.emoji + '</div>';
                    html += '<div class="info">';
                    html += '<div class="name">' + b.name + '</div>';
                    html += '<div class="meta">';
                    html += '<span class="type">' + (catLabels[b.cat] || b.cat) + '</span>';
                    html += '<span class="progress-text">' + p.done + '/' + p.total + '</span>';
                    html += '</div>';
                    html += '</div>';
                    html += '<div class="progress-bar-mini"><div class="fill" style="width:' + p.pct + '%"></div></div>';
                    html += '<div class="check' + (done ? ' done' : '') + '">✓</div>';
                    html += '</div>';
                }

                html += '</div>';
            }

            container.innerHTML = html;
        }

        // ============================================================
        // MODAL
        // ============================================================

        function openModal(id) {
            var b = BADGES[id];
            if (!b) return;
            state.current = id;

            document.getElementById("modalIcon").textContent = b.emoji;
            document.getElementById("modalTitle").textContent = b.name;
            var catMap = { activity: "Activity Badge", staged: "Staged Badge", challenge: "Challenge Award",
                top: "Top Award" };
            document.getElementById("modalCategory").textContent = catMap[b.cat] || b.cat;

            var stageSelector = document.getElementById("stageSelector");
            var requirementsTitle = document.getElementById("requirementsTitle");

            if (b.isStaged && b.stages) {
                stageSelector.style.display = "flex";
                requirementsTitle.textContent = "Stage Requirements";

                var select = document.getElementById("stageSelect");
                var stageKeys = Object.keys(b.stages);
                stageKeys.sort(function(a, b) { return parseFloat(a) - parseFloat(b); });

                if (stageKeys.indexOf(state.currentStage) === -1) {
                    state.currentStage = stageKeys[0];
                }

                select.innerHTML = "";
                for (var sk = 0; sk < stageKeys.length; sk++) {
                    var key = stageKeys[sk];
                    var option = document.createElement("option");
                    option.value = key;
                    option.textContent = "Stage " + key;
                    if (key === state.currentStage) {
                        option.selected = true;
                    }
                    select.appendChild(option);
                }

                renderStageRequirements(id, state.currentStage);

                var sp = getStageProgress(id, state.currentStage);
                document.getElementById("stageProgress").textContent = sp.done + "/" + sp.total;
                document.getElementById("modalProgress").textContent = "Stage " + state.currentStage + " progress";
                document.getElementById("modalCount").textContent = sp.done + " / " + sp.total;

                select.onchange = function() {
                    state.currentStage = this.value;
                    renderStageRequirements(id, state.currentStage);
                    var sp2 = getStageProgress(id, state.currentStage);
                    document.getElementById("stageProgress").textContent = sp2.done + "/" + sp2.total;
                    document.getElementById("modalProgress").textContent = "Stage " + state.currentStage + " progress";
                    document.getElementById("modalCount").textContent = sp2.done + " / " + sp2.total;
                    save();
                };

            } else {
                stageSelector.style.display = "none";
                requirementsTitle.textContent = "Requirements";

                var list = document.getElementById("modalRequirements");
                var html = "";
                for (var i = 0; i < b.reqs.length; i++) {
                    var key = id + "-" + i;
                    var done = !!state.done[key];
                    html += '<li>';
                    html += '<span class="num">' + (i + 1) + '.</span>';
                    html += '<input type="checkbox" ' + (done ? 'checked' : '') + ' onchange="toggleReq(\'' + id + '\',' + i +
                        ')" />';
                    html += '<span class="text' + (done ? ' done' : '') + '">' + b.reqs[i] + '</span>';
                    html += '</li>';
                }
                list.innerHTML = html;

                var p = getProgress(id);
                document.getElementById("modalProgress").textContent = p.done + " / " + p.total + " complete";
                document.getElementById("modalCount").textContent = p.done + " / " + p.total;
            }

            document.getElementById("modalOverlay").className = "modal-overlay show";
        }

        function renderStageRequirements(id, stageKey) {
            var b = BADGES[id];
            if (!b || !b.isStaged) return;

            var reqs = b.stages[stageKey];
            var list = document.getElementById("modalRequirements");
            var html = "";
            for (var i = 0; i < reqs.length; i++) {
                var key = id + "-" + stageKey + "-" + i;
                var done = !!state.done[key];
                html += '<li>';
                html += '<span class="num">' + (i + 1) + '.</span>';
                html += '<input type="checkbox" ' + (done ? 'checked' : '') + ' onchange="toggleStageReq(\'' + id + '\',\'' +
                    stageKey + '\',' + i + ')" />';
                html += '<span class="text' + (done ? ' done' : '') + '">' + reqs[i] + '</span>';
                html += '</li>';
            }
            list.innerHTML = html;

            var sp = getStageProgress(id, stageKey);
            document.getElementById("stageProgress").textContent = sp.done + "/" + sp.total;
        }

        function closeModal() {
            document.getElementById("modalOverlay").className = "modal-overlay";
            state.current = null;
        }

        function toggleReq(id, index) {
            var key = id + "-" + index;
            state.done[key] = !state.done[key];
            save();

            var p = getProgress(id);
            document.getElementById("modalProgress").textContent = p.done + " / " + p.total + " complete";
            document.getElementById("modalCount").textContent = p.done + " / " + p.total;

            var items = document.querySelectorAll("#modalRequirements li");
            if (items[index]) {
                var cb = items[index].querySelector('input[type="checkbox"]');
                var text = items[index].querySelector(".text");
                if (cb) cb.checked = !!state.done[key];
                if (text) {
                    text.className = state.done[key] ? "text done" : "text";
                }
            }

            renderAll();
        }

        function toggleStageReq(id, stageKey, index) {
            var key = id + "-" + stageKey + "-" + index;
            state.done[key] = !state.done[key];
            save();

            var sp = getStageProgress(id, stageKey);
            document.getElementById("stageProgress").textContent = sp.done + "/" + sp.total;
            document.getElementById("modalProgress").textContent = "Stage " + stageKey + " progress";
            document.getElementById("modalCount").textContent = sp.done + " / " + sp.total;

            var items = document.querySelectorAll("#modalRequirements li");
            if (items[index]) {
                var cb = items[index].querySelector('input[type="checkbox"]');
                var text = items[index].querySelector(".text");
                if (cb) cb.checked = !!state.done[key];
                if (text) {
                    text.className = state.done[key] ? "text done" : "text";
                }
            }

            renderAll();
        }

        function resetBadge() {
            var id = state.current;
            if (!id) return;
            var b = BADGES[id];
            if (!b) return;
            if (!confirm('Reset all progress for "' + b.name + '"?')) return;

            if (b.isStaged && b.stages) {
                var stageKeys = Object.keys(b.stages);
                for (var s = 0; s < stageKeys.length; s++) {
                    var stageKey = stageKeys[s];
                    var reqs = b.stages[stageKey];
                    for (var r = 0; r < reqs.length; r++) {
                        delete state.done[id + "-" + stageKey + "-" + r];
                    }
                }
                renderStageRequirements(id, state.currentStage);
                var sp = getStageProgress(id, state.currentStage);
                document.getElementById("stageProgress").textContent = sp.done + "/" + sp.total;
                document.getElementById("modalProgress").textContent = "Stage " + state.currentStage + " progress";
                document.getElementById("modalCount").textContent = sp.done + " / " + sp.total;
            } else {
                for (var i = 0; i < b.reqs.length; i++) {
                    delete state.done[id + "-" + i];
                }
                var p = getProgress(id);
                document.getElementById("modalProgress").textContent = p.done + " / " + p.total + " complete";
                document.getElementById("modalCount").textContent = p.done + " / " + p.total;

                var items = document.querySelectorAll("#modalRequirements li");
                for (var j = 0; j < items.length; j++) {
                    var cb = items[j].querySelector('input[type="checkbox"]');
                    var text = items[j].querySelector(".text");
                    if (cb) cb.checked = false;
                    if (text) text.className = "text";
                }
            }

            save();
            renderAll();
        }

        // ============================================================
        // EVENTS
        // ============================================================

        document.getElementById("modalClose").onclick = closeModal;
        document.getElementById("modalOverlay").onclick = function(e) {
            if (e.target === this) closeModal();
        };
        document.getElementById("modalReset").onclick = resetBadge;

        document.getElementById("searchBox").oninput = function() {
            state.search = this.value;
            renderAll();
        };

        document.onkeydown = function(e) {
            if (e.key === "Escape") closeModal();
        };

        // ============================================================
        // BOOT
        // ============================================================

        load();
        renderAll();
        console.log("🏕️ Explorer Badge Tracker loaded!");
        console.log("📊 " + Object.keys(BADGES).length + " badges loaded.");
    </script>
