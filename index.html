<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />

    <title>Explorer Badge Tracker</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            color: #1a1a1a;
            padding-bottom: 80px;
        }

        /* ===== HEADER ===== */
        .app-header {
            background: #0a3d62;
            color: white;
            padding: 16px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .app-header h1 {
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .app-header .badge-count {
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 14px;
        }

        /* ===== PROGRESS BAR ===== */
        .progress-section {
            background: white;
            padding: 16px 20px;
            margin: 12px 16px;
            border-radius: 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
        }
        .progress-section .label {
            font-size: 14px;
            color: #666;
            margin-bottom: 4px;
        }
        .progress-section .percentage {
            font-size: 28px;
            font-weight: 700;
            color: #0a3d62;
        }
        .progress-bar {
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin-top: 8px;
            overflow: hidden;
        }
        .progress-bar .fill {
            height: 100%;
            background: #0a3d62;
            border-radius: 4px;
            transition: width 0.3s ease;
            width: 0%;
        }

        /* ===== CATEGORY TABS ===== */
        .tabs {
            display: flex;
            gap: 8px;
            padding: 0 16px;
            margin-bottom: 12px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .tabs::-webkit-scrollbar { display: none; }
        .tab-btn {
            flex: 0 0 auto;
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: #e8e8e8;
            font-size: 14px;
            font-weight: 500;
            color: #555;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .tab-btn.active {
            background: #0a3d62;
            color: white;
        }
        .tab-btn:active { transform: scale(0.96); }

        /* ===== BADGE GRID ===== */
        .badge-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
            gap: 12px;
            padding: 0 16px;
        }

        /* ===== BADGE CARD ===== */
        .badge-card {
            background: white;
            border-radius: 12px;
            padding: 14px 12px 12px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            position: relative;
        }
        .badge-card:active { transform: scale(0.97); }
        .badge-card .badge-img {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 8px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            color: #aaa;
            margin-bottom: 8px;
            overflow: hidden;
            object-fit: cover;
        }
        .badge-card .badge-img img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .badge-card .badge-name {
            font-size: 13px;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 2px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .badge-card .badge-progress {
            font-size: 12px;
            color: #888;
        }
        .badge-card .check-mark {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #0a3d62;
            color: white;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .badge-card .check-mark.complete {
            opacity: 1;
            background: #2e7d32;
        }

        /* ===== DETAIL VIEW (Modal) ===== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            display: none;
            align-items: flex-end;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: white;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            border-radius: 20px 20px 0 0;
            padding: 20px 20px 30px;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal .modal-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #eee;
        }
        .modal .modal-header .thumb {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
            overflow: hidden;
        }
        .modal .modal-header .thumb img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .modal .modal-header .info h2 {
            font-size: 18px;
            font-weight: 700;
            line-height: 1.2;
        }
        .modal .modal-header .info .cat {
            font-size: 13px;
            color: #888;
        }
        .modal .modal-close {
            margin-left: auto;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 4px 8px;
        }
        .modal .requirements {
            list-style: none;
            padding: 0;
        }
        .modal .requirements li {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 15px;
            line-height: 1.4;
        }
        .modal .requirements li:last-child { border-bottom: none; }
        .modal .requirements li input[type="checkbox"] {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
            margin-top: 1px;
            accent-color: #0a3d62;
            cursor: pointer;
        }
        .modal .requirements li .req-text {
            flex: 1;
        }
        .modal .requirements li .req-text.done {
            text-decoration: line-through;
            color: #999;
        }
        .modal .modal-footer {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal .modal-footer .count {
            font-size: 14px;
            color: #666;
        }
        .modal .modal-footer .reset-btn {
            background: none;
            border: 1px solid #ddd;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            color: #888;
            cursor: pointer;
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

        /* ===== RESPONSIVE TWEAKS ===== */
        @media (min-width: 600px) {
            .badge-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
            .modal { border-radius: 20px; margin: 20px; max-height: 80vh; }
            .modal-overlay { align-items: center; }
        }
        @media (max-width: 400px) {
            .badge-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
            .badge-card .badge-name { font-size: 12px; }
        }

        /* ===== UTILITY ===== */
        .hidden { display: none !important; }
        .mt-8 { margin-top: 8px; }
        .text-center { text-align: center; }

        /* ===== SEARCH ===== */
        .search-box {
            margin: 8px 16px 12px;
            padding: 10px 16px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            width: calc(100% - 32px);
            background: white;
            outline: none;
        }
        .search-box:focus { border-color: #0a3d62; }
    </style>
</head>

        // ============================================================
        //  APP STATE
        // ============================================================

        let state = {
            completed: {}, // keyed by "badgeId-requirementIndex" => true/false
            activeTab: "all",
            searchQuery: "",
            currentBadge: null // for modal
        };

        // Load from localStorage
        function loadState() {
            try {
                const saved = localStorage.getItem("explorerTrackerState");
                if (saved) {
                    const parsed = JSON.parse(saved);
                    state.completed = parsed.completed || {};
                }
            } catch (e) { /* ignore */ }
        }

        function saveState() {
            try {
                localStorage.setItem("explorerTrackerState", JSON.stringify({
                    completed: state.completed
                }));
            } catch (e) { /* ignore */ }
        }

        // ============================================================
        //  RENDER FUNCTIONS
        // ============================================================

        function getBadgeProgress(badgeId) {
            const badge = BADGE_DATA[badgeId];
            if (!badge) return { done: 0, total: 0, percent: 0 };
            const total = badge.requirements.length;
            let done = 0;
            badge.requirements.forEach((req, i) => {
                if (state.completed[`${badgeId}-${i}`]) done++;
            });
            return { done, total, percent: total > 0 ? Math.round((done / total) * 100) : 0 };
        }

        function getAllProgress() {
            let totalDone = 0,
                totalReqs = 0;
            Object.keys(BADGE_DATA).forEach(id => {
                const b = BADGE_DATA[id];
                b.requirements.forEach((req, i) => {
                    totalReqs++;
                    if (state.completed[`${id}-${i}`]) totalDone++;
                });
            });
            return { done: totalDone, total: totalReqs, percent: totalReqs > 0 ? Math.round((totalDone / totalReqs) *
                100) : 0 };
        }

        function renderProgress() {
            const p = getAllProgress();
            document.getElementById("progressPercent").textContent = p.percent + "%";
            document.getElementById("progressFill").style.width = p.percent + "%";
            document.getElementById("totalBadgeCount").textContent = Object.keys(BADGE_DATA).length;
        }

        function getFilteredBadges() {
            const allIds = Object.keys(BADGE_DATA);
            let filtered = allIds;

            // Tab filter
            if (state.activeTab !== "all") {
                filtered = filtered.filter(id => BADGE_DATA[id].category === state.activeTab);
            }

            // Search filter
            if (state.searchQuery.trim()) {
                const q = state.searchQuery.toLowerCase().trim();
                filtered = filtered.filter(id => BADGE_DATA[id].name.toLowerCase().includes(q));
            }

            return filtered;
        }

        function renderGrid() {
            const grid = document.getElementById("badgeGrid");
            const ids = getFilteredBadges();

            if (ids.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1;">
                        <div class="icon">🔍</div>
                        <p>No badges found matching your filters.</p>
                    </div>
                `;
                return;
            }

            let html = "";
            ids.forEach(id => {
                const badge = BADGE_DATA[id];
                const prog = getBadgeProgress(id);
                const isComplete = prog.percent === 100 && prog.total > 0;
                const isStaged = badge.category === "staged";

                html += `
                    <div class="badge-card" data-badge="${id}" onclick="openModal('${id}')">
                        ${isComplete ? `<div class="check-mark complete">✓</div>` : `<div class="check-mark">✓</div>`}
                        <div class="badge-img">${badge.emoji}</div>
                        <div class="badge-name">${badge.name}</div>
                        <div class="badge-progress">${prog.done}/${prog.total}</div>
                        ${isStaged ? '<div style="font-size:10px;color:#888;margin-top:2px;">Staged</div>' : ''}
                    </div>
                `;
            });

            grid.innerHTML = html;
        }

        // ============================================================
        //  MODAL FUNCTIONS
        // ============================================================

        function openModal(badgeId) {
            const badge = BADGE_DATA[badgeId];
            if (!badge) return;
            state.currentBadge = badgeId;

            // Set header
            document.getElementById("modalTitle").textContent = badge.name;
            document.getElementById("modalThumb").innerHTML = badge.emoji;
            const categoryMap = {
                activity: "Activity Badge",
                staged: "Staged Badge",
                challenge: "Challenge Award",
                top: "Top Award",
                other: "Other Award"
            };
            document.getElementById("modalCategory").textContent = categoryMap[badge.category] || badge.category;

            // Requirements
            const list = document.getElementById("modalRequirements");
            let html = "";
            badge.requirements.forEach((req, i) => {
                const key = `${badgeId}-${i}`;
                const done = !!state.completed[key];
                html += `
                    <li>
                        <input type="checkbox" ${done ? 'checked' : ''} onchange="toggleRequirement('${badgeId}', ${i})" />
                        <span class="req-text ${done ? 'done' : ''}">${req}</span>
                    </li>
                `;
            });
            list.innerHTML = html;

            // Footer
            const prog = getBadgeProgress(badgeId);
            document.getElementById("modalCount").textContent = `${prog.done} / ${prog.total} complete`;

            // Show modal
            document.getElementById("modalOverlay").classList.add("open");
        }

        function closeModal() {
            document.getElementById("modalOverlay").classList.remove("open");
            state.currentBadge = null;
        }

        function toggleRequirement(badgeId, index) {
            const key = `${badgeId}-${index}`;
            state.completed[key] = !state.completed[key];
            saveState();

            // Update modal UI
            const badge = BADGE_DATA[badgeId];
            if (!badge) return;
            const prog = getBadgeProgress(badgeId);
            document.getElementById("modalCount").textContent = `${prog.done} / ${prog.total} complete`;

            // Update checkboxes and text styling
            const items = document.querySelectorAll("#modalRequirements li");
            if (items[index]) {
                const cb = items[index].querySelector('input[type="checkbox"]');
                const text = items[index].querySelector(".req-text");
                if (cb) cb.checked = !!state.completed[key];
                if (text) text.classList.toggle("done", !!state.completed[key]);
            }

            // Refresh grid and progress
            renderGrid();
            renderProgress();
        }

        function resetBadge() {
            const badgeId = state.currentBadge;
            if (!badgeId) return;
            const badge = BADGE_DATA[badgeId];
            if (!badge) return;
            if (!confirm(`Reset all progress for "${badge.name}"?`)) return;

            badge.requirements.forEach((req, i) => {
                delete state.completed[`${badgeId}-${i}`];
            });
            saveState();

            // Re-render modal
            const prog = getBadgeProgress(badgeId);
            document.getElementById("modalCount").textContent = `${prog.done} / ${prog.total} complete`;

            // Update all checkboxes in modal
            const items = document.querySelectorAll("#modalRequirements li");
            items.forEach((li, i) => {
                const cb = li.querySelector('input[type="checkbox"]');
                const text = li.querySelector(".req-text");
                const key = `${badgeId}-${i}`;
                if (cb) cb.checked = false;
                if (text) text.classList.remove("done");
            });

            renderGrid();
            renderProgress();
        }

        // ============================================================
        //  EVENT BINDING & INIT
        // ============================================================

        // Modal close events
        document.getElementById("modalClose").addEventListener("click", closeModal);
        document.getElementById("modalOverlay").addEventListener("click", function(e) {
            if (e.target === this) closeModal();
        });
        document.getElementById("modalReset").addEventListener("click", resetBadge);

        // Tabs
        document.querySelectorAll(".tab-btn").forEach(btn => {
            btn.addEventListener("click", function() {
                document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
                this.classList.add("active");
                state.activeTab = this.dataset.tab;
                renderGrid();
            });
        });

        // Search
        document.getElementById("searchBox").addEventListener("input", function() {
            state.searchQuery = this.value;
            renderGrid();
        });

        // Keyboard shortcut: Escape to close modal
        document.addEventListener("keydown", function(e) {
            if (e.key === "Escape") closeModal();
        });

        // ============================================================
        //  BOOT
        // ============================================================

        loadState();
        renderProgress();
        renderGrid();

        console.log("🏕️ Explorer Badge Tracker loaded!");
        console.log(`📊 ${Object.keys(BADGE_DATA).length} badges loaded.`);
        console.log("💾 Data saved to localStorage.");
    </script>
