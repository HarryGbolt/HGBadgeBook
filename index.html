<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />

<!-- Favicon for browser tabs -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏕️</text></svg>" />

<!-- For iOS/Android home screen icons -->
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%232d1b69'/%3E%3Ctext x='50' y='72' text-anchor='middle' font-size='56'%3E🏕️%3C/text%3E%3C/svg%3E" />

<!-- For Android Chrome home screen -->
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22Explorer%20Badge%20Tracker%22%2C%22short_name%22%3A%22Badge%20Tracker%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%232d1b69%22%2C%22theme_color%22%3A%22%232d1b69%22%7D" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Explorer Badge Tracker</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            background: #f2f4f8;
            color: #1a1a2e;
            padding-bottom: 80px;
            -webkit-font-smoothing: antialiased;
        }

        .header {
            background: linear-gradient(135deg, #2d1b69 0%, #4a2c8a 100%);
            color: white;
            padding: 16px 20px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-top {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .header-top h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .header-top .refresh-btn {
            position: absolute;
            right: 0;
            background: none;
            border: none;
            color: rgba(255,255,255,0.6);
            font-size: 18px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .header-top .refresh-btn:active {
            background: rgba(255,255,255,0.15);
        }
        .header-top .refresh-btn.loading {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .loading-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }
        .loading-state .spinner {
            font-size: 40px;
            display: block;
            margin-bottom: 12px;
            animation: spin 1.5s linear infinite;
        }
        .loading-state .error {
            color: #e74c3c;
        }
        .loading-state .retry-btn {
            margin-top: 16px;
            background: #4a2c8a;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
        }

        .badge-list {
            padding: 8px 16px 16px;
        }

        .badge-item {
            display: flex;
            align-items: center;
            gap: 16px;
            background: white;
            border-radius: 16px;
            padding: 14px 16px;
            margin-bottom: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid rgba(0, 0, 0, 0.02);
            min-height: 90px;
        }
        .badge-item:active {
            transform: scale(0.98);
            background: #f8f8fc;
        }
        .badge-item .badge-image {
            width: 64px;
            height: 64px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f3ff;
            border-radius: 12px;
            overflow: hidden;
        }
        .badge-item .badge-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 6px;
        }
        .badge-item .badge-info {
            flex: 1;
            min-width: 0;
        }
        .badge-item .badge-info .name {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a2e;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
        }
        .badge-item .badge-status {
            font-size: 12px;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 12px;
            flex-shrink: 0;
            text-align: center;
            min-width: 80px;
        }
        .badge-item .badge-status.not-started {
            background: #f0f0f5;
            color: #888;
        }
        .badge-item .badge-status.in-progress {
            background: #e3f0ff;
            color: #4a2c8a;
        }
        .badge-item .badge-status.complete {
            background: #e6f7e6;
            color: #2e7d32;
        }

        .section-header {
            padding: 16px 16px 6px;
            font-size: 18px;
            font-weight: 700;
            color: #1a1a2e;
            background: #f2f4f8;
        }

        .empty {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }
        .empty .big {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
        }

        .stage-list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: white;
            border-radius: 12px;
            margin-bottom: 8px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid #f0f0f5;
        }
        .stage-list-item:active {
            transform: scale(0.98);
            background: #f8f8fc;
        }
        .stage-list-item .stage-info {
            flex: 1;
        }
        .stage-list-item .stage-info .stage-name {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a2e;
        }
        .stage-list-item .stage-info .stage-progress-text {
            font-size: 13px;
            color: #888;
            margin-top: 2px;
        }
        .stage-list-item .stage-status {
            font-size: 13px;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 12px;
            flex-shrink: 0;
        }
        .stage-list-item .stage-status.not-started {
            background: #f0f0f5;
            color: #888;
        }
        .stage-list-item .stage-status.in-progress {
            background: #e3f0ff;
            color: #4a2c8a;
        }
        .stage-list-item .stage-status.complete {
            background: #e6f7e6;
            color: #2e7d32;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 200;
            display: none;
            align-items: flex-start;
            justify-content: center;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 0;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal {
            background: white;
            width: 100%;
            max-width: 500px;
            height: 100vh;
            max-height: 100vh;
            padding: 0;
            overflow-y: auto;
            animation: fadeIn 0.3s ease;
            border-radius: 0;
            display: flex;
            flex-direction: column;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .modal-header {
            background: linear-gradient(135deg, #2d1b69 0%, #4a2c8a 100%);
            color: white;
            padding: 16px 20px 20px;
            position: sticky;
            top: 0;
            z-index: 10;
            flex-shrink: 0;
        }
        .modal-header .modal-top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header .modal-top-row .modal-close {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: white;
            font-size: 22px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .modal-header .modal-top-row .modal-close:active {
            background: rgba(255, 255, 255, 0.3);
        }
        .modal-header .modal-top-row .modal-fav-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            transition: transform 0.2s;
            padding: 4px 8px;
            color: rgba(255, 255, 255, 0.5);
        }
        .modal-header .modal-top-row .modal-fav-btn.active {
            color: #f5a623;
        }
        .modal-header .modal-top-row .modal-fav-btn:active {
            transform: scale(0.85);
        }
        .modal-header .modal-badge-info {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 12px;
        }
        .modal-header .modal-badge-info .big-icon {
            width: 72px;
            height: 72px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
        }
        .modal-header .modal-badge-info .big-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 8px;
        }
        .modal-header .modal-badge-info .title-group h2 {
            font-size: 22px;
            font-weight: 700;
            line-height: 1.2;
        }
        .modal-header .modal-badge-info .title-group .cat-label {
            font-size: 13px;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 500;
        }

        .modal-body {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
        }
        .modal-body .stage-selector {
            display: none;
        }
        .modal-body .requirements-title {
            font-size: 17px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 12px;
        }
        .modal-body .mandatory-label {
            font-size: 14px;
            font-weight: 700;
            color: #1a1a2e;
            margin-top: 8px;
            margin-bottom: 4px;
        }
        .modal-body .choose-hint {
            font-size: 14px;
            color: #4a2c8a;
            font-weight: 600;
            background: #f5f3ff;
            padding: 8px 14px;
            border-radius: 10px;
            margin: 8px 0 12px;
        }
        .modal-body ul {
            list-style: none;
            padding: 0;
        }
        .modal-body ul li {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f5;
            font-size: 15px;
            line-height: 1.4;
            color: #1a1a2e;
        }
        .modal-body ul li:last-child {
            border-bottom: none;
        }
        .modal-body ul li input[type="checkbox"] {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
            margin-top: 1px;
            accent-color: #4a2c8a;
            cursor: pointer;
            border-radius: 6px;
        }
        .modal-body ul li .text.done {
            text-decoration: line-through;
            color: #bbb;
        }
        .modal-body ul li .text.mandatory-done {
            text-decoration: line-through;
            color: #bbb;
        }

        .modal-footer {
            padding: 16px 20px 24px;
            border-top: 1px solid #eee;
            background: white;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-footer .footer-left .count {
            font-size: 14px;
            color: #4a2c8a;
            font-weight: 600;
        }
        .modal-footer .footer-left .progress-label {
            font-size: 12px;
            color: #888;
        }
        .modal-footer .reset-btn {
            background: none;
            border: none;
            font-size: 14px;
            font-weight: 600;
            color: #e74c3c;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .modal-footer .reset-btn:active {
            background: #fef0ef;
        }

        @media (min-width: 600px) {
            .modal {
                max-width: 500px;
                height: 90vh;
                max-height: 90vh;
                border-radius: 24px;
                margin: 20px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            }
            .modal-overlay {
                align-items: center;
            }
            .badge-item .badge-image {
                width: 80px;
                height: 80px;
            }
        }

        .modal::-webkit-scrollbar {
            width: 4px;
        }
        .modal::-webkit-scrollbar-track {
            background: transparent;
        }
        .modal::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 4px;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 6px 0 env(safe-area-inset-bottom);
            z-index: 150;
            height: 64px;
            box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.06);
        }
        .bottom-nav .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            background: none;
            border: none;
            font-size: 10px;
            color: #aaa;
            cursor: pointer;
            padding: 4px 16px;
            transition: color 0.2s;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }
        .bottom-nav .nav-item .nav-icon {
            font-size: 24px;
            line-height: 1;
            opacity: 0.4;
            transition: opacity 0.2s;
            filter: grayscale(100%);
        }
        .bottom-nav .nav-item .nav-label {
            font-size: 10px;
            font-weight: 500;
            opacity: 0.4;
            transition: opacity 0.2s;
        }
        .bottom-nav .nav-item.active .nav-icon {
            opacity: 1;
            filter: grayscale(0%);
        }
        .bottom-nav .nav-item.active .nav-label {
            opacity: 1;
            color: #4a2c8a;
        }

        .page {
            display: none;
        }
        .page.active {
            display: block;
        }

        .profile-header {
            background: white;
            padding: 20px;
            margin: 12px 16px;
            border-radius: 16px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            text-align: center;
        }
        .profile-header .avatar {
            font-size: 48px;
            display: block;
            margin-bottom: 4px;
        }
        .profile-header .name-input {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a2e;
            border: none;
            background: transparent;
            text-align: center;
            width: 100%;
            outline: none;
            font-family: inherit;
            padding: 4px 0;
        }
        .profile-header .name-input::placeholder {
            color: #ccc;
            font-weight: 400;
        }
        .profile-header .name-input:focus {
            border-bottom: 2px solid #4a2c8a;
        }
        .profile-header .stats {
            display: flex;
            justify-content: space-around;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #f0f0f5;
        }
        .profile-header .stats .stat {
            text-align: center;
        }
        .profile-header .stats .stat .num {
            font-size: 22px;
            font-weight: 700;
            color: #4a2c8a;
        }
        .profile-header .stats .stat .label {
            font-size: 11px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .profile-section-title {
            padding: 14px 16px 4px;
            font-size: 16px;
            font-weight: 700;
            color: #1a1a2e;
            background: #f2f4f8;
        }

        .profile-badge-list {
            padding: 0 16px 12px;
        }

        .profile-badge-item {
            display: flex;
            align-items: center;
            gap: 14px;
            background: white;
            border-radius: 12px;
            padding: 10px 14px;
            margin-bottom: 8px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid #f0f0f5;
        }
        .profile-badge-item:active {
            transform: scale(0.98);
            background: #f8f8fc;
        }
        .profile-badge-item .pbi-image {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f3ff;
            border-radius: 10px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .profile-badge-item .pbi-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 4px;
        }
        .profile-badge-item .pbi-info {
            flex: 1;
            min-width: 0;
        }
        .profile-badge-item .pbi-info .pbi-name {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a2e;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .profile-badge-item .pbi-info .pbi-progress {
            font-size: 12px;
            color: #888;
        }
        .profile-badge-item .pbi-status {
            font-size: 12px;
            font-weight: 600;
            padding: 2px 12px;
            border-radius: 10px;
            flex-shrink: 0;
        }
        .profile-badge-item .pbi-status.complete {
            background: #e6f7e6;
            color: #2e7d32;
        }
        .profile-badge-item .pbi-status.in-progress {
            background: #e3f0ff;
            color: #4a2c8a;
        }

        .profile-empty {
            text-align: center;
            padding: 16px;
            color: #999;
        }
        .profile-empty .big {
            font-size: 24px;
            display: block;
            margin-bottom: 2px;
        }
        .profile-empty p {
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-top">
            <h1>Explorer Badge Tracker</h1>
            <button class="refresh-btn" id="refreshBtn" title="Refresh badge data">🔄</button>
        </div>
    </div>

    <div id="appContent">
        <!-- Loading state -->
        <div id="loadingState" class="loading-state">
            <span class="spinner">⏳</span>
            <p>Loading badge data...</p>
        </div>

        <!-- Error state -->
        <div id="errorState" class="loading-state" style="display:none;">
            <span class="spinner error">⚠️</span>
            <p class="error">Failed to load badge data</p>
            <button class="retry-btn" onclick="loadBadgeData()">Retry</button>
        </div>

        <!-- Main app -->
        <div id="mainApp" style="display:none;">
            <div class="page active" id="pageHome">
                <div id="badgeContainer"></div>
            </div>

            <div class="page" id="pageProfile">
                <div id="profileContainer"></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modalContent">
            <div class="modal-header">
                <div class="modal-top-row">
                    <button class="modal-close" id="modalClose">✕</button>
                    <button class="modal-fav-btn" id="modalFavBtn">☆</button>
                </div>
                <div class="modal-badge-info">
                    <div class="big-icon" id="modalIcon"></div>
                    <div class="title-group">
                        <h2 id="modalTitle">Badge Name</h2>
                        <div class="cat-label" id="modalCategory">Category</div>
                    </div>
                </div>
            </div>
            <div class="modal-body" id="modalBody">
                <div class="stage-selector" id="stageSelector" style="display:none;"></div>
                <div class="requirements-title" id="requirementsTitle">Requirements</div>
                <div id="modalContentArea"></div>
            </div>
            <div class="modal-footer">
                <div class="footer-left">
                    <div class="count" id="modalCount">0 / 0 complete</div>
                    <div class="progress-label">Progress</div>
                </div>
                <button class="reset-btn" id="modalReset">Reset All</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav" id="bottomNav">
        <button class="nav-item active" data-page="home">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">Home</span>
        </button>
        <button class="nav-item" data-page="profile">
            <span class="nav-icon">👤</span>
            <span class="nav-label">Me</span>
        </button>
    </div>

    <script>
        // ============================================================
        // CONFIGURATION
        // ============================================================

        // 🔧 CHANGE THIS URL to your Gist raw URL
        var BADGES_URL = 'https://gist.githubusercontent.com/YOUR_USERNAME/YOUR_GIST_ID/raw/badges.json';

        // ============================================================
        // STATE
        // ============================================================

        var BADGES = {};
        var SECTION_ORDER = [
            { key: "activity", label: "Activity Badges" },
            { key: "staged", label: "Staged Badges" },
            { key: "challenge", label: "Challenge Awards" },
            { key: "top", label: "Top Awards" }
        ];

        var state = {
            done: {},
            current: null,
            currentStage: "1",
            favourites: [],
            currentPage: "home",
            modalView: null,
            userName: "",
            scrollPosition: 0
        };

        // ============================================================
        // LOAD BADGE DATA
        // ============================================================

        function loadBadgeData() {
            var loading = document.getElementById('loadingState');
            var error = document.getElementById('errorState');
            var main = document.getElementById('mainApp');
            var refreshBtn = document.getElementById('refreshBtn');

            loading.style.display = 'block';
            error.style.display = 'none';
            main.style.display = 'none';
            refreshBtn.classList.add('loading');

            fetch(BADGES_URL, {
                cache: 'no-cache',
                headers: { 'Cache-Control': 'no-cache' }
            })
            .then(function(response) {
                if (!response.ok) throw new Error('HTTP ' + response.status);
                return response.json();
            })
            .then(function(data) {
                BADGES = data;
                loading.style.display = 'none';
                main.style.display = 'block';
                refreshBtn.classList.remove('loading');
                load();
                navigateTo(state.currentPage || 'home');
                console.log('✅ Badges loaded!', Object.keys(BADGES).length + ' badges');
            })
            .catch(function(err) {
                console.error('Failed to load badges:', err);
                loading.style.display = 'none';
                error.style.display = 'block';
                refreshBtn.classList.remove('loading');
            });
        }

        // ============================================================
        // STATE MANAGEMENT
        // ============================================================

        function load() {
            try {
                var saved = localStorage.getItem("explorerTracker");
                if (saved) {
                    var parsed = JSON.parse(saved);
                    state.done = parsed.done || {};
                    state.currentStage = parsed.currentStage || "1";
                    state.favourites = parsed.favourites || [];
                    state.userName = parsed.userName || "";
                }
            } catch (e) {}
        }

        function save() {
            try {
                localStorage.setItem("explorerTracker", JSON.stringify({
                    done: state.done,
                    currentStage: state.currentStage,
                    favourites: state.favourites,
                    userName: state.userName
                }));
            } catch (e) {}
        }

        // ============================================================
        // FAVOURITES
        // ============================================================

        function isFavourite(id) {
            return state.favourites.indexOf(id) !== -1;
        }

        function toggleFavourite(id) {
            var index = state.favourites.indexOf(id);
            if (index === -1) {
                state.favourites.push(id);
            } else {
                state.favourites.splice(index, 1);
            }
            save();
            renderAll();
        }

        // ============================================================
        // HELPERS
        // ============================================================

        function getImageHtml(badge) {
            if (badge.image) {
                return '<img src="' + badge.image + '" alt="' + badge.name + '" />';
            }
            return '🏅';
        }

        function getProgress(id) {
            var badge = BADGES[id];
            if (!badge) return { done: 0, total: 0, pct: 0, mandatoryDone: 0, mandatoryTotal: 0, optionsDone: 0,
                optionsTotal: 0 };

            // For badges with mandatory + choose
            if (badge.mandatory && badge.options) {
                var mandatoryTotal = badge.mandatory.length;
                var mandatoryDone = 0;
                for (var m = 0; m < mandatoryTotal; m++) {
                    if (state.done[id + "-mandatory-" + m]) mandatoryDone++;
                }

                var optionsTotal = badge.options.length;
                var optionsDone = 0;
                for (var o = 0; o < optionsTotal; o++) {
                    if (state.done[id + "-option-" + o]) optionsDone++;
                }

                var requiredOptions = badge.choose || 3;
                var optionsComplete = Math.min(optionsDone, requiredOptions);
                var total = mandatoryTotal + requiredOptions;
                var done = mandatoryDone + optionsComplete;

                var isComplete = (mandatoryDone === mandatoryTotal) && (optionsDone >= requiredOptions);

                return {
                    done: done,
                    total: total,
                    pct: total > 0 ? Math.round((done / total) * 100) : 0,
                    mandatoryDone: mandatoryDone,
                    mandatoryTotal: mandatoryTotal,
                    optionsDone: optionsDone,
                    optionsTotal: optionsTotal,
                    isComplete: isComplete
                };
            }

            // For staged badges
            if (badge.isStaged && badge.stages) {
                var totalDone = 0;
                var totalReqs = 0;
                var stageKeys = Object.keys(badge.stages);
                for (var s = 0; s < stageKeys.length; s++) {
                    var stageKey = stageKeys[s];
                    var reqs = badge.stages[stageKey];
                    for (var r = 0; r < reqs.length; r++) {
                        totalReqs++;
                        if (state.done[id + "-" + stageKey + "-" + r]) totalDone++;
                    }
                }
                var pct = totalReqs > 0 ? Math.round((totalDone / totalReqs) * 100) : 0;
                return { done: totalDone, total: totalReqs, pct: pct };
            }

            // For regular badges
            var total = badge.reqs ? badge.reqs.length : 0;
            var done = 0;
            for (var i = 0; i < total; i++) {
                if (state.done[id + "-" + i]) done++;
            }
            var pct = total > 0 ? Math.round((done / total) * 100) : 0;
            return { done: done, total: total, pct: pct };
        }

        function getStageProgress(id, stageKey) {
            var badge = BADGES[id];
            if (!badge || !badge.isStaged || !badge.stages) return { done: 0, total: 0, pct: 0 };
            var reqs = badge.stages[stageKey];
            if (!reqs) return { done: 0, total: 0, pct: 0 };
            var done = 0;
            for (var i = 0; i < reqs.length; i++) {
                if (state.done[id + "-" + stageKey + "-" + i]) done++;
            }
            return { done: done, total: reqs.length, pct: reqs.length > 0 ? Math.round((done / reqs.length) * 100) : 0 };
        }

        function getStatusText(id) {
            var badge = BADGES[id];
            if (!badge) return "Not Started";

            if (badge.mandatory && badge.options) {
                var p = getProgress(id);
                if (p.isComplete) return "Complete";
                if (p.done > 0) return "In Progress";
                return "Not Started";
            }

            if (badge.choose && badge.totalOptions) {
                var done = 0;
                for (var i = 0; i < badge.reqs.length; i++) {
                    if (state.done[id + "-" + i]) done++;
                }
                if (done >= badge.choose) return "Complete";
                if (done > 0) return "In Progress";
                return "Not Started";
            }

            if (badge.isStaged && badge.stages) {
                var p = getProgress(id);
                return getStatusTextFromPct(p.pct);
            }

            var p = getProgress(id);
            return getStatusTextFromPct(p.pct);
        }

        function getStatusTextFromPct(pct) {
            if (pct === 100) return "Complete";
            if (pct > 0) return "In Progress";
            return "Not Started";
        }

        function getStatusClass(pct) {
            if (pct === 100) return "complete";
            if (pct > 0) return "in-progress";
            return "not-started";
        }

        function getFiltered() {
            var ids = Object.keys(BADGES);
            if (state.currentPage === "favourites") {
                ids = ids.filter(function(id) {
                    return state.favourites.indexOf(id) !== -1;
                });
            }
            return ids;
        }

        function getBadgesByCategory(catKey) {
            var ids = getFiltered();
            return ids.filter(function(id) {
                return BADGES[id].cat === catKey;
            });
        }

        // ============================================================
        // RENDER
        // ============================================================

        function renderAll() {
            renderList();
            renderProfile();
        }

        function renderList() {
            var container = document.getElementById("badgeContainer");
            var allIds = getFiltered();

            if (allIds.length === 0) {
                container.innerHTML =
                    '<div class="empty"><span class="big">⭐</span><p>No favourites yet. Tap the star on any badge to add it!</p></div>';
                return;
            }

            var html = '';
            for (var s = 0; s < SECTION_ORDER.length; s++) {
                var section = SECTION_ORDER[s];
                var badgeIds = getBadgesByCategory(section.key);

                if (badgeIds.length === 0) continue;

                html += '<div class="section-header">' + section.label + '</div>';
                html += '<div class="badge-list">';

                for (var i = 0; i < badgeIds.length; i++) {
                    var id = badgeIds[i];
                    var b = BADGES[id];
                    var p = getProgress(id);
                    var statusText = getStatusText(id);
                    var statusClass = getStatusClass(p.pct);

                    html += '<div class="badge-item" data-id="' + id + '" onclick="openModal(\'' + id + '\')">';
                    html += '<div class="badge-image">' + getImageHtml(b) + '</div>';
                    html += '<div class="badge-info">';
                    html += '<div class="name">' + b.name + '</div>';
                    html += '</div>';
                    html += '<div class="badge-status ' + statusClass + '">' + statusText + '</div>';
                    html += '</div>';
                }

                html += '</div>';
            }

            container.innerHTML = html;
        }

        function renderProfile() {
            var container = document.getElementById("profileContainer");

            var allIds = Object.keys(BADGES);
            var completedIds = [];
            var startedIds = [];
            var notStartedIds = [];

            for (var i = 0; i < allIds.length; i++) {
                var id = allIds[i];
                var p = getProgress(id);
                var status = getStatusText(id);
                if (p.total > 0) {
                    if (status === "Complete") completedIds.push(id);
                    else if (status === "In Progress") startedIds.push(id);
                    else notStartedIds.push(id);
                }
            }

            var html = '';

            html += '<div class="profile-header">';
            html += '<span class="avatar">👤</span>';
            html += '<input class="name-input" id="userNameInput" type="text" placeholder="Your Name" value="' + state
                .userName + '" />';
            html += '<div class="stats">';
            html += '<div class="stat"><div class="num">' + completedIds.length + '</div><div class="label">Completed</div></div>';
            html += '<div class="stat"><div class="num">' + startedIds.length + '</div><div class="label">In Progress</div></div>';
            html += '<div class="stat"><div class="num">' + notStartedIds.length +
            '</div><div class="label">Not Started</div></div>';
            html += '</div>';
            html += '</div>';

            html += '<div class="profile-section-title">⭐ Favourites</div>';
            if (state.favourites.length === 0) {
                html += '<div class="profile-empty"><span class="big">⭐</span><p>No favourites yet</p></div>';
            } else {
                html += '<div class="profile-badge-list">';
                for (var f = 0; f < state.favourites.length && f < 20; f++) {
                    var fid = state.favourites[f];
                    var fb = BADGES[fid];
                    if (!fb) continue;
                    var fp = getProgress(fid);
                    var fstatus = getStatusText(fid);
                    var fclass = getStatusClass(fp.pct);
                    html += '<div class="profile-badge-item" onclick="openModal(\'' + fid + '\')">';
                    html += '<div class="pbi-image">' + getImageHtml(fb) + '</div>';
                    html += '<div class="pbi-info">';
                    html += '<div class="pbi-name">' + fb.name + '</div>';
                    html += '<div class="pbi-progress">' + fp.done + '/' + fp.total + '</div>';
                    html += '</div>';
                    html += '<div class="pbi-status ' + fclass + '">' + fstatus + '</div>';
                    html += '</div>';
                }
                if (state.favourites.length > 20) {
                    html += '<div class="profile-empty"><p>+ ' + (state.favourites.length - 20) + ' more</p></div>';
                }
                html += '</div>';
            }

            html += '<div class="profile-section-title">⏳ In Progress</div>';
            if (startedIds.length === 0) {
                html += '<div class="profile-empty"><span class="big">⏳</span><p>No badges in progress</p></div>';
            } else {
                html += '<div class="profile-badge-list">';
                for (var s = 0; s < startedIds.length && s < 20; s++) {
                    var sid = startedIds[s];
                    var sb = BADGES[sid];
                    if (!sb) continue;
                    var sp = getProgress(sid);
                    var status = getStatusText(sid);
                    var statusClass = getStatusClass(sp.pct);
                    html += '<div class="profile-badge-item" onclick="openModal(\'' + sid + '\')">';
                    html += '<div class="pbi-image">' + getImageHtml(sb) + '</div>';
                    html += '<div class="pbi-info">';
                    html += '<div class="pbi-name">' + sb.name + '</div>';
                    html += '<div class="pbi-progress">' + sp.done + '/' + sp.total + '</div>';
                    html += '</div>';
                    html += '<div class="pbi-status ' + statusClass + '">' + status + '</div>';
                    html += '</div>';
                }
                if (startedIds.length > 20) {
                    html += '<div class="profile-empty"><p>+ ' + (startedIds.length - 20) + ' more</p></div>';
                }
                html += '</div>';
            }

            html += '<div class="profile-section-title">✅ Completed</div>';
            if (completedIds.length === 0) {
                html += '<div class="profile-empty"><span class="big">✅</span><p>No badges completed yet</p></div>';
            } else {
                html += '<div class="profile-badge-list">';
                for (var c = 0; c < completedIds.length && c < 20; c++) {
                    var cid = completedIds[c];
                    var cb = BADGES[cid];
                    if (!cb) continue;
                    html += '<div class="profile-badge-item" onclick="openModal(\'' + cid + '\')">';
                    html += '<div class="pbi-image">' + getImageHtml(cb) + '</div>';
                    html += '<div class="pbi-info">';
                    html += '<div class="pbi-name">' + cb.name + '</div>';
                    html += '<div class="pbi-progress">Complete</div>';
                    html += '</div>';
                    html += '<div class="pbi-status complete">Complete</div>';
                    html += '</div>';
                }
                if (completedIds.length > 20) {
                    html += '<div class="profile-empty"><p>+ ' + (completedIds.length - 20) + ' more</p></div>';
                }
                html += '</div>';
            }

            container.innerHTML = html;

            var nameInput = document.getElementById("userNameInput");
            if (nameInput) {
                nameInput.addEventListener("input", function() {
                    state.userName = this.value;
                    save();
                });
                nameInput.addEventListener("blur", function() {
                    save();
                });
                nameInput.addEventListener("keydown", function(e) {
                    if (e.key === "Enter") {
                        this.blur();
                        document.activeElement && document.activeElement.blur();
                    }
                });
                if (!state.userName) {
                    nameInput.placeholder = "Your Name";
                }
            }
        }

        // ============================================================
        // NAVIGATION
        // ============================================================

        function navigateTo(page) {
            state.currentPage = page;

            document.querySelectorAll('.page').forEach(function(el) {
                el.className = 'page';
            });
            document.getElementById('page' + page.charAt(0).toUpperCase() + page.slice(1)).className = 'page active';

            document.querySelectorAll('.nav-item').forEach(function(el) {
                el.className = 'nav-item';
                if (el.dataset.page === page) {
                    el.className = 'nav-item active';
                }
            });

            renderAll();
        }

        // ============================================================
        // MODAL
        // ============================================================

        function openModal(id) {
            state.scrollPosition = window.scrollY;

            var b = BADGES[id];
            if (!b) return;
            state.current = id;

            if (b.isStaged && b.stages) {
                state.modalView = 'stageList';
                showStageList(id);
                return;
            }

            state.modalView = 'detail';

            document.getElementById("modalIcon").innerHTML = getImageHtml(b);
            document.getElementById("modalTitle").textContent = b.name;
            var catMap = { activity: "Activity Badge", staged: "Staged Badge", challenge: "Challenge Award",
                top: "Top Award" };
            document.getElementById("modalCategory").textContent = catMap[b.cat] || b.cat;

            var fav = isFavourite(id);
            var favBtn = document.getElementById("modalFavBtn");
            favBtn.textContent = fav ? "★" : "☆";
            favBtn.className = "modal-fav-btn" + (fav ? " active" : "");

            document.getElementById("stageSelector").style.display = "none";
            document.getElementById("requirementsTitle").textContent = "Requirements";

            var contentArea = document.getElementById("modalContentArea");
            var html = '';

            if (b.mandatory && b.options) {
                var choose = b.choose || 3;

                html += '<div class="mandatory-label">Mandatory:</div>';
                html += '<ul>';
                for (var m = 0; m < b.mandatory.length; m++) {
                    var mKey = id + "-mandatory-" + m;
                    var mDone = !!state.done[mKey];
                    html += '<li>';
                    html += '<input type="checkbox" ' + (mDone ? 'checked' : '') + ' onchange="toggleMandatory(\'' + id +
                        '\',' + m + ')" />';
                    html += '<span class="text' + (mDone ? ' done' : '') + '">' + b.mandatory[m] + '</span>';
                    html += '</li>';
                }
                html += '</ul>';

                html += '<div class="choose-hint">Choose ' + choose + ' of ' + b.options.length +
                ' activities below:</div>';
                html += '<ul>';
                for (var o = 0; o < b.options.length; o++) {
                    var oKey = id + "-option-" + o;
                    var oDone = !!state.done[oKey];
                    html += '<li>';
                    html += '<input type="checkbox" ' + (oDone ? 'checked' : '') + ' onchange="toggleOption(\'' + id +
                        '\',' + o + ')" />';
                    html += '<span class="text' + (oDone ? ' done' : '') + '">' + b.options[o] + '</span>';
                    html += '</li>';
                }
                html += '</ul>';

                var p = getProgress(id);
                var mandatoryDone = 0;
                for (var md = 0; md < b.mandatory.length; md++) {
                    if (state.done[id + "-mandatory-" + md]) mandatoryDone++;
                }
                var optionsDone = 0;
                for (var od = 0; od < b.options.length; od++) {
                    if (state.done[id + "-option-" + od]) optionsDone++;
                }
                var required = b.choose || 3;
                var progressDisplay = mandatoryDone + Math.min(optionsDone, required) + '/' + (b.mandatory.length +
                    required);
                document.getElementById("modalCount").textContent = progressDisplay + " complete";

            } else if (b.reqs) {
                if (b.choose && b.totalOptions) {
                    html += '<div class="choose-hint">Choose ' + b.choose + ' of ' + b.totalOptions +
                        ' activities below:</div>';
                }
                html += '<ul>';
                for (var i = 0; i < b.reqs.length; i++) {
                    var key = id + "-" + i;
                    var done = !!state.done[key];
                    html += '<li>';
                    html += '<input type="checkbox" ' + (done ? 'checked' : '') + ' onchange="toggleReq(\'' + id + '\',' +
                        i + ')" />';
                    html += '<span class="text' + (done ? ' done' : '') + '">' + b.reqs[i] + '</span>';
                    html += '</li>';
                }
                html += '</ul>';
                var p = getProgress(id);
                document.getElementById("modalCount").textContent = p.done + " / " + p.total + " complete";
            }

            contentArea.innerHTML = html;

            document.getElementById("modalOverlay").className = "modal-overlay show";
            document.body.style.overflow = "hidden";
        }

        function showStageList(id) {
            var b = BADGES[id];
            if (!b || !b.isStaged) return;

            state.modalView = 'stageList';
            state.current = id;
            var stageKeys = b.stageList || Object.keys(b.stages);

            document.getElementById("modalIcon").innerHTML = getImageHtml(b);
            document.getElementById("modalTitle").textContent = b.name;
            var catMap = { activity: "Activity Badge", staged: "Staged Badge", challenge: "Challenge Award",
                top: "Top Award" };
            document.getElementById("modalCategory").textContent = catMap[b.cat] || b.cat;

            document.getElementById("stageSelector").style.display = "none";
            document.getElementById("requirementsTitle").textContent = "Select a Stage";

            var contentArea = document.getElementById("modalContentArea");
            var html = '';

            for (var i = 0; i < stageKeys.length; i++) {
                var stageKey = stageKeys[i];
                var sp = getStageProgress(id, stageKey);
                var statusText = sp.pct === 100 ? "✅ Complete" : (sp.pct > 0 ? "⏳ " + sp.done + "/" + sp.total :
                    "⬜ Not Started");
                var statusClass = sp.pct === 100 ? "complete" : (sp.pct > 0 ? "in-progress" : "not-started");

                html += '<div class="stage-list-item" onclick="openStage(\'' + id + '\', \'' + stageKey + '\')">';
                html += '<div class="stage-info">';
                html += '<div class="stage-name">Stage ' + stageKey + '</div>';
                html += '<div class="stage-progress-text">' + sp.done + '/' + sp.total + ' complete</div>';
                html += '</div>';
                html += '<div class="stage-status ' + statusClass + '">' + statusText + '</div>';
                html += '</div>';
            }

            contentArea.innerHTML = html;

            var totalDone = 0;
            var totalReqs = 0;
            for (var s = 0; s < stageKeys.length; s++) {
                var sp2 = getStageProgress(id, stageKeys[s]);
                totalDone += sp2.done;
                totalReqs += sp2.total;
            }
            document.getElementById("modalCount").textContent = totalDone + " / " + totalReqs + " complete";

            document.getElementById("modalOverlay").className = "modal-overlay show";
            document.body.style.overflow = "hidden";
        }

        function openStage(id, stageKey) {
            var b = BADGES[id];
            if (!b || !b.isStaged) return;
            state.current = id;
            state.currentStage = stageKey;
            state.modalView = 'stageDetail';

            document.getElementById("modalIcon").innerHTML = getImageHtml(b);
            document.getElementById("modalTitle").textContent = b.name + " - Stage " + stageKey;
            var catMap = { activity: "Activity Badge", staged: "Staged Badge", challenge: "Challenge Award",
                top: "Top Award" };
            document.getElementById("modalCategory").textContent = catMap[b.cat] || b.cat;

            document.getElementById("stageSelector").style.display = "none";
            document.getElementById("requirementsTitle").textContent = "Stage Requirements";

            var reqs = b.stages[stageKey];
            var contentArea = document.getElementById("modalContentArea");
            var html = '<ul>';
            for (var i = 0; i < reqs.length; i++) {
                var key = id + "-" + stageKey + "-" + i;
                var done = !!state.done[key];
                html += '<li>';
                html += '<input type="checkbox" ' + (done ? 'checked' : '') + ' onchange="toggleStageReq(\'' + id + '\',\'' +
                    stageKey + '\',' + i + ')" />';
                html += '<span class="text' + (done ? ' done' : '') + '">' + reqs[i] + '</span>';
                html += '</li>';
            }
            html += '</ul>';
            contentArea.innerHTML = html;

            var sp = getStageProgress(id, stageKey);
            document.getElementById("modalCount").textContent = sp.done + " / " + sp.total + " complete";

            document.getElementById("modalOverlay").className = "modal-overlay show";
            document.body.style.overflow = "hidden";
        }

        function closeModal() {
            document.getElementById("modalOverlay").className = "modal-overlay";
            document.body.style.overflow = "";

            setTimeout(function() {
                if (state.scrollPosition > 0) {
                    window.scrollTo(0, state.scrollPosition);
                }
            }, 10);

            state.current = null;
            state.modalView = null;
        }

        function goBack() {
            if (document.getElementById("modalOverlay").className === "modal-overlay show") {
                if (state.modalView === 'stageDetail' && state.current) {
                    showStageList(state.current);
                    return true;
                }
                if (state.modalView === 'stageList') {
                    closeModal();
                    return true;
                }
                closeModal();
                return true;
            }
            return false;
        }

        // ============================================================
        // TOGGLE FUNCTIONS
        // ============================================================

        function toggleReq(id, index) {
            var key = id + "-" + index;
            state.done[key] = !state.done[key];
            save();
            renderAll();

            var b = BADGES[id];
            if (b && b.reqs) {
                var p = getProgress(id);
                document.getElementById("modalCount").textContent = p.done + " / " + p.total + " complete";
                var items = document.querySelectorAll("#modalContentArea ul li");
                if (items[index]) {
                    var cb = items[index].querySelector('input[type="checkbox"]');
                    var text = items[index].querySelector(".text");
                    if (cb) cb.checked = !!state.done[key];
                    if (text) {
                        text.className = state.done[key] ? "text done" : "text";
                    }
                }
            }
        }

        function toggleMandatory(id, index) {
            var key = id + "-mandatory-" + index;
            state.done[key] = !state.done[key];
            save();
            renderAll();
            updateModalProgress(id);
        }

        function toggleOption(id, index) {
            var key = id + "-option-" + index;
            state.done[key] = !state.done[key];
            save();
            renderAll();
            updateModalProgress(id);
        }

        function updateModalProgress(id) {
            var b = BADGES[id];
            if (!b || !b.mandatory || !b.options) return;

            var mandatoryDone = 0;
            for (var md = 0; md < b.mandatory.length; md++) {
                if (state.done[id + "-mandatory-" + md]) mandatoryDone++;
            }
            var optionsDone = 0;
            for (var od = 0; od < b.options.length; od++) {
                if (state.done[id + "-option-" + od]) optionsDone++;
            }
            var required = b.choose || 3;
            var progressDisplay = mandatoryDone + Math.min(optionsDone, required) + '/' + (b.mandatory.length + required);
            document.getElementById("modalCount").textContent = progressDisplay + " complete";

            var items = document.querySelectorAll("#modalContentArea ul li");
            for (var i = 0; i < items.length; i++) {
                var cb = items[i].querySelector('input[type="checkbox"]');
                var text = items[i].querySelector(".text");
                var key = id + "-" + (i < b.mandatory.length ? "mandatory-" + i : "option-" + (i - b.mandatory.length));
                if (cb) cb.checked = !!state.done[key];
                if (text) {
                    text.className = state.done[key] ? "text done" : "text";
                }
            }
        }

        function toggleStageReq(id, stageKey, index) {
            var key = id + "-" + stageKey + "-" + index;
            state.done[key] = !state.done[key];
            save();

            var sp = getStageProgress(id, stageKey);
            document.getElementById("modalCount").textContent = sp.done + " / " + sp.total + " complete";

            var items = document.querySelectorAll("#modalContentArea ul li");
            if (items[index]) {
                var cb = items[index].querySelector('input[type="checkbox"]');
                var text = items[index].querySelector(".text");
                if (cb) cb.checked = !!state.done[key];
                if (text) {
                    text.className = state.done[key] ? "text done" : "text";
                }
            }

            renderAll();
        }

        function resetBadge() {
            var id = state.current;
            if (!id) return;
            var b = BADGES[id];
            if (!b) return;
            if (!confirm('Reset all progress for "' + b.name + '"?')) return;

            if (b.isStaged && b.stages) {
                var stageKeys = Object.keys(b.stages);
                for (var s = 0; s < stageKeys.length; s++) {
                    var stageKey = stageKeys[s];
                    var reqs = b.stages[stageKey];
                    for (var r = 0; r < reqs.length; r++) {
                        delete state.done[id + "-" + stageKey + "-" + r];
                    }
                }
                if (state.modalView === 'stageDetail') {
                    openStage(id, state.currentStage);
                } else {
                    showStageList(id);
                }
            } else if (b.mandatory && b.options) {
                for (var m = 0; m < b.mandatory.length; m++) {
                    delete state.done[id + "-mandatory-" + m];
                }
                for (var o = 0; o < b.options.length; o++) {
                    delete state.done[id + "-option-" + o];
                }
                openModal(id);
            } else {
                for (var i = 0; i < b.reqs.length; i++) {
                    delete state.done[id + "-" + i];
                }
                openModal(id);
            }

            save();
            renderAll();
        }

        // ============================================================
        // EVENTS
        // ============================================================

        document.getElementById("modalClose").onclick = function() {
            if (state.modalView === 'stageDetail' && state.current) {
                showStageList(state.current);
                return;
            }
            closeModal();
        };

        document.getElementById("modalOverlay").onclick = function(e) {
            if (e.target === this) closeModal();
        };

        document.getElementById("modalReset").onclick = resetBadge;

        document.getElementById("modalFavBtn").onclick = function() {
            if (state.current) {
                toggleFavourite(state.current);
                var fav = isFavourite(state.current);
                this.textContent = fav ? "★" : "☆";
                this.className = "modal-fav-btn" + (fav ? " active" : "");
            }
        };

        document.querySelectorAll('.nav-item').forEach(function(item) {
            item.onclick = function() {
                state.scrollPosition = window.scrollY;
                navigateTo(this.dataset.page);
            };
        });

        document.getElementById('refreshBtn').onclick = function() {
            loadBadgeData();
        };

        window.addEventListener('popstate', function(e) {
            if (goBack()) {
                e.preventDefault();
                history.pushState(null, null, window.location.href);
            }
        });

        history.pushState(null, null, window.location.href);

        document.onkeydown = function(e) {
            if (e.key === "Escape") {
                if (goBack()) {
                    e.preventDefault();
                }
            }
        };

        // ============================================================
        // BOOT
        // ============================================================

        // Load badge data from Gist
        loadBadgeData();

        console.log("🏕️ Explorer Badge Tracker loaded!");
        console.log("📊 Data source:", BADGES_URL);
    </script>
</body>
</html>
